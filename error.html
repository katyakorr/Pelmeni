<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница в разработке | Chubby Hippo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/media.css" />
</head>
<body class="error-page">
  <header class="header">
    <div class="container header__inner">
      <a class="logo" href="index.html#top" aria-label="Chubby Hippo">
        <img src="images/logo/логостекстом.svg" alt="" />
      </a>

      <nav class="nav" aria-label="Основная навигация">
        <a href="index.html#top">Главный экран</a>
        <a href="index.html#about">О нас</a>
        <a href="index.html#delivery">Доставка</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>

      <div class="socials">
        <a href="error.html" aria-label="Telegram"><img src="images/vectors/Telegram.svg" alt="" /></a>
        <a href="error.html" aria-label="VK"><img src="images/vectors/VK.svg" alt="" /></a>
        <a href="error.html" aria-label="WhatsApp"><img src="images/vectors/ватсап.svg" alt="" /></a>
      </div>
    </div>
  </header>

  <main class="error-main">
    <div class="error-bg-circle" aria-hidden="true"></div>
    <img class="error-pixels error-pixels--left" src="images/vectors/пиксели.svg" alt="" />
    <img class="error-pixels error-pixels--right" src="images/vectors/пиксели.svg" alt="" />
    <img class="error-branch" src="images/decor/Сакура.png" alt="" />

    <img class="error-petal error-petal--one" src="images/vectors/Лепесток.svg" alt="" />
    <img class="error-petal error-petal--two" src="images/vectors/Лепесток.svg" alt="" />
    <img class="error-petal error-petal--three" src="images/vectors/Лепесток.svg" alt="" />
    <img class="error-petal error-petal--four" src="images/vectors/Лепесток.svg" alt="" />
    <img class="error-petal error-petal--five" src="images/vectors/Лепесток.svg" alt="" />
    <img class="error-flower error-flower--one" src="images/vectors/цветочек.svg" alt="" />
    <img class="error-flower error-flower--two" src="images/vectors/цветочек.svg" alt="" />

    <section class="error-message" aria-labelledby="error-title">
      <h1 id="error-title">Страница находится в разработке</h1>
      <p>Пожалуйста, вернитесь позже</p>
    </section>

    <img class="error-hippo" src="images/hippos/CryHippoОшибка.png" alt="Грустный бегемот Chubby Hippo" />
  </main>

  <script src="js/main.js"></script>
</body>
</html>
